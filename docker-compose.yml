version: '3.8'

services:
  # Python/FastAPI Backend (Built from src folder)
  backend:
    build:
       context: ./backend/src
       dockerfile: Dockerfile
    container_name: estate-backend
    ports:
      - "8000:8000"
    volumes:
      # Map the SQLite database for persistence
      # Backend config uses ../app.db relative to src, which maps to /app.db in the container
      - ./backend/app.db:/app.db
    env_file:
      - ./backend/src/.env
    restart: always

  # Vite Dev Server Frontend
  frontend:
    build:
       context: ./frontend
       dockerfile: Dockerfile
    container_name: estate-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

networks:
  default:
    name: estate-network
